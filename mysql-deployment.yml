apiVersion: apps/v1
kind: Deployment

metadata:
  name: mysql-deployment
  labels:
    app: mysql

spec:
  replicas: 1

  selector:
    matchLabels:
      app: mysql

  template:
    metadata:
      labels:
        app: mysql

    spec:
      containers:
      - name: mysql-cont
        image: mysql:8.0

        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_ROOT_PASSWORD

        - name: MYSQL_DATABASE
          value: "mydb"

        - name: MYSQL_USER
          value: "sandeep"

        - name: MYSQL_PASSWORD
          value: "sandeep"

        ports:
        - containerPort: 3306

        volumeMounts:
        - name: mysql-volume
          mountPath: /docker-entrypoint-initdb.d

      volumes:
      - name: mysql-volume
        configMap:
          name: mysql-config
